name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: typewriter
            asset_name: typewriter-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: typewriter
            asset_name: typewriter-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: typewriter
            asset_name: typewriter-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: typewriter.exe
            asset_name: typewriter-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Keep Cargo.toml version in sync with the git tag
      - name: Set version from tag
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          sed -i.bak "s/^version = \".*\"/version = \"$TAG\"/" Cargo.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Strip binaries on Linux and macOS to reduce size
      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      # Rename artifact to include platform info
      - name: Rename artifact
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
